<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1526;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" rx="8" fill="url(#bgGrad)"/>

  <!-- Icon container -->
  <g transform="translate(28, 28)">
    <!-- Outer hexagon ring -->
    <polygon points="52,4 96,28 96,76 52,100 8,76 8,28"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>
    <!-- Inner hexagon -->
    <polygon points="52,16 84,34 84,70 52,88 20,70 20,34"
             fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.25"/>

    <!-- X mark — two crossing strokes -->
    <line x1="30" y1="28" x2="74" y2="76" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="74" y1="28" x2="30" y2="76" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Center dot -->
    <circle cx="52" cy="52" r="4" fill="url(#accentGrad)" filter="url(#glow)"/>

    <!-- Corner tick marks (targeting aesthetic) -->
    <line x1="8" y1="28" x2="18" y2="28" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>
    <line x1="8" y1="28" x2="8" y2="38" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>

    <line x1="96" y1="28" x2="86" y2="28" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>
    <line x1="96" y1="28" x2="96" y2="38" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>

    <line x1="8" y1="76" x2="18" y2="76" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>
    <line x1="8" y1="76" x2="8" y2="66" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>

    <line x1="96" y1="76" x2="86" y2="76" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>
    <line x1="96" y1="76" x2="96" y2="66" stroke="#00C6FF" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="148" y="76"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="38"
        font-weight="800"
        letter-spacing="2"
        fill="#FFFFFF">
    XINTEL<tspan fill="url(#accentGrad)">OPS</tspan>
  </text>

  <!-- Tagline -->
  <text x="150" y="100"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="4"
        fill="#6B8CAE"
        text-transform="uppercase">
    INTELLIGENCE THAT ACTS
  </text>

  <!-- Subtle bottom accent line -->
  <line x1="148" y1="110" x2="372" y2="110" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>
</svg>
