<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060A14;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0A1020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1830;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0072FF;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#00C6FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00C6FF;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0072FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0072FF;stop-opacity:0" />
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1200" height="400" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgMain)"/>

  <!-- Ambient center glow -->
  <ellipse cx="600" cy="200" rx="500" ry="250" fill="url(#centerGlow)"/>

  <!-- Grid lines - horizontal (subtle) -->
  <g opacity="0.04" stroke="#4A90D9" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
  </g>
  <!-- Grid lines - vertical (subtle) -->
  <g opacity="0.04" stroke="#4A90D9" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative large targeting ring - left background -->
  <circle cx="160" cy="200" r="180" fill="none" stroke="#1A3A6A" stroke-width="1" opacity="0.4"/>
  <circle cx="160" cy="200" r="140" fill="none" stroke="#1A3A6A" stroke-width="0.5" opacity="0.3"/>
  <circle cx="160" cy="200" r="100" fill="none" stroke="#1E4A80" stroke-width="0.5" opacity="0.2"/>
  <!-- Crosshair lines left -->
  <line x1="-20" y1="200" x2="340" y2="200" stroke="#1A3A6A" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="20" x2="160" y2="380" stroke="#1A3A6A" stroke-width="0.5" opacity="0.3"/>

  <!-- Decorative large targeting ring - right background -->
  <circle cx="1040" cy="200" r="180" fill="none" stroke="#1A3A6A" stroke-width="1" opacity="0.4"/>
  <circle cx="1040" cy="200" r="140" fill="none" stroke="#1A3A6A" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1040" cy="200" r="100" fill="none" stroke="#1E4A80" stroke-width="0.5" opacity="0.2"/>
  <!-- Crosshair lines right -->
  <line x1="860" y1="200" x2="1220" y2="200" stroke="#1A3A6A" stroke-width="0.5" opacity="0.3"/>
  <line x1="1040" y1="20" x2="1040" y2="380" stroke="#1A3A6A" stroke-width="0.5" opacity="0.3"/>

  <!-- Central icon group -->
  <g transform="translate(540, 110)">
    <!-- Outer hex -->
    <polygon points="60,0 110,30 110,90 60,120 10,90 10,30"
             fill="none" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.5"/>
    <!-- Inner hex -->
    <polygon points="60,14 96,35 96,85 60,106 24,85 24,35"
             fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.3"/>

    <!-- X strokes -->
    <line x1="32" y1="28" x2="88" y2="92" stroke="url(#blueGrad)" stroke-width="8" stroke-linecap="round" filter="url(#strongGlow)"/>
    <line x1="88" y1="28" x2="32" y2="92" stroke="url(#blueGrad)" stroke-width="8" stroke-linecap="round" filter="url(#strongGlow)"/>
    <!-- Center dot -->
    <circle cx="60" cy="60" r="5" fill="url(#blueGrad)" filter="url(#strongGlow)"/>

    <!-- Corner ticks -->
    <line x1="10" y1="30" x2="22" y2="30" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="10" y1="30" x2="10" y2="42" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="110" y1="30" x2="98" y2="30" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="110" y1="30" x2="110" y2="42" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="10" y1="90" x2="22" y2="90" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="10" y1="90" x2="10" y2="78" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="110" y1="90" x2="98" y2="90" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
    <line x1="110" y1="90" x2="110" y2="78" stroke="#00C6FF" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Main wordmark -->
  <text x="600" y="268"
        font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
        font-size="62"
        font-weight="900"
        letter-spacing="6"
        text-anchor="middle"
        fill="#FFFFFF"
        filter="url(#softGlow)">
    XINTEL<tspan fill="url(#blueGrad)">OPS</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="302"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="8"
        text-anchor="middle"
        fill="#4A7FAA">
    INTELLIGENCE THAT ACTS
  </text>

  <!-- Bottom accent line -->
  <line x1="200" y1="322" x2="1000" y2="322" stroke="url(#glowLine)" stroke-width="1.5"/>

  <!-- Dot accents on line ends -->
  <circle cx="200" cy="322" r="2.5" fill="#0072FF" opacity="0.6"/>
  <circle cx="1000" cy="322" r="2.5" fill="#00C6FF" opacity="0.6"/>

  <!-- Sub-tagline / descriptor -->
  <text x="600" y="352"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="11"
        font-weight="300"
        letter-spacing="3"
        text-anchor="middle"
        fill="#2A4A6A">
    GEOPOLITICAL INTELLIGENCE · SIGNAL VERIFICATION · STRATEGIC ANALYSIS
  </text>

  <!-- Top left corner bracket -->
  <line x1="40" y1="40" x2="80" y2="40" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="40" x2="40" y2="80" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>

  <!-- Top right corner bracket -->
  <line x1="1160" y1="40" x2="1120" y2="40" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="1160" y1="40" x2="1160" y2="80" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom left corner bracket -->
  <line x1="40" y1="360" x2="80" y2="360" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="360" x2="40" y2="320" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom right corner bracket -->
  <line x1="1160" y1="360" x2="1120" y2="360" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="1160" y1="360" x2="1160" y2="320" stroke="#00C6FF" stroke-width="1.5" opacity="0.5"/>
</svg>
