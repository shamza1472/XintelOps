name: XIntelOps Ingest (Optional)

# Optional backup ingest — primary scheduler is Cursor Automation.
# See docs/CURSOR_AUTOMATION.md

on:
  schedule:
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:

concurrency:
  group: xintelops-ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest sources only (no LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LLM_PROVIDER: cursor
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
      DUAL_WRITE_LEGACY: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Ingest and store
        run: python scripts/run_ingest.py
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-bundle
          path: artifacts/
          retention-days: 3
