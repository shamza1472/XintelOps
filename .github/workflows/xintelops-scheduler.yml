name: XIntelOps Intelligence Scheduler

on:
  schedule:
    # Every 3 hours PKT → 01,04,07,10,13,16,19,22 UTC
    # Matches production edge function: 00/03/06/09/12/15/18/21 PKT
    - cron: "0 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Pipeline mode
        required: true
        default: scan
        type: choice
        options:
          - scan
          - ingest-only
          - seed

concurrency:
  group: xintelops-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Run XIntelOps Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SIMILARITY_THRESHOLD: "0.85"
      RATE_DELAY_MS: "3000"
      FETCH_TIMEOUT_SEC: "12"
      MAX_CHARS_PER_SOURCE: "2000"
      JOURNALIST_BATCH_SIZE: "10"
      SOURCES_CSV_PATH: data/xintel_sources.csv
      JOURNALISTS_CSV_PATH: data/journalists.csv
      TWITTER_RSS_BASE: https://rsshub.app/twitter/user
      DUAL_WRITE_LEGACY: "true"
      PYTHONPATH: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY OPENAI_API_KEY ANTHROPIC_API_KEY RESEND_API_KEY RECIPIENT_EMAIL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          exit $missing

      - name: Seed catalogs (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'seed'
        run: python scripts/run_scan.py --seed

      - name: Ingest only (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'ingest-only'
        run: python scripts/run_scan.py --ingest-only

      - name: Run full intelligence scan
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'scan')
        run: python scripts/run_scan.py

      - name: Upload run summary
        if: always()
        run: |
          echo "## XIntelOps Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ github.event.inputs.mode || 'scan' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time (UTC): $(date -u)" >> "$GITHUB_STEP_SUMMARY"
